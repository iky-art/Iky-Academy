<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — Iky Academy</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div class="panel panel--pad text-center" style="max-width:400px; width:100%;">
    <div class="brand__mark" style="margin:0 auto 16px;">I</div>
    <h1 style="font-size:1.5rem;">Iky Academy</h1>
    <p class="muted" style="margin-bottom:24px;">Belajar coding gaya manga — kumpulkan XP, jaga streak, dan naik level.</p>

    <button id="googleBtn" class="btn btn--hanko btn--full">
      <span id="googleBtnLabel">🔐 Masuk dengan Google</span>
    </button>
    <p class="muted mt-16" style="font-size:.8rem;">Daftar otomatis kalau ini pertama kali kamu masuk — nggak perlu form terpisah.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
<script src="js/supabase-client.js"></script>
<script>
(async function () {
  if (!client) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;">⚠️ Gagal memuat koneksi database. Cek internet kamu, lalu refresh halaman.</div>';
    return;
  }
  const { data: { session } } = await client.auth.getSession();
  if (session) { window.location.href = "index.html"; return; }

  document.getElementById("googleBtn").addEventListener("click", async function () {
    document.getElementById("googleBtnLabel").innerHTML = '<span class="spinner"></span>';
    await signInWithGoogle();
  });
})();
</script>
</body>
</html>
