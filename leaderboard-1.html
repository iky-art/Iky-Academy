<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Iky Academy</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar__inner">
    <a href="index.html" class="brand">
      <div class="brand__mark">I</div>
      <span class="brand__name">Iky Academy</span>
    </a>
    <div class="navbar__right">
      <div class="navlinks-wrap" id="navMenu">
        <div class="navlinks">
          <a href="index.html" class="navlink">Beranda</a>
          <a href="leaderboard.html" class="navlink">Leaderboard</a>
          <a href="rooms.html" class="navlink">Voice Room</a>
          <a href="profile.html" class="navlink">Profil</a>
        </div>
      </div>
      <button class="icon-btn" id="notifBtn" aria-label="Notifikasi">🔔<span class="icon-btn__dot" id="notifDot"></span></button>
      <div class="dropdown" id="notifDropdown">
        <div class="dropdown__head">Notifikasi</div>
        <div id="notifList"><div class="notif-empty">Memuat...</div></div>
      </div>
      <button class="icon-btn" id="themeToggle" aria-label="Ganti tema">🌙</button>
      <a href="profile.html" class="avatar" id="navAvatar">I</a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false"><span class="nav-toggle__bar"></span></button>
    </div>
  </div>
</nav>

<main class="wrap" style="padding-top:24px; padding-bottom:60px;">
  <div class="flex justify-between items-center" style="flex-wrap:wrap; gap:10px;">
    <h1 style="margin:0; font-size:1.6rem;">🏆 Leaderboard</h1>
    <span class="badge badge--ok mono">🟢 Live</span>
  </div>
  <p class="muted">Update otomatis secara real-time tiap ada perubahan XP.</p>

  <div class="panel mt-16" id="lbList"><div class="notif-empty">Memuat...</div></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
<script src="js/supabase-client.js"></script>
<script src="js/main.js"></script>
<script>
(async function () {
  const session = await requireSession("login.html");
  if (!session) return;
  const user = session.user;
  const profile = await ensureProfile(user);
  await initNavbar(session, profile);

  async function renderLeaderboard() {
    const { data: rows } = await client
      .from("profiles")
      .select("id, display_name, avatar_url, xp")
      .order("xp", { ascending: false })
      .limit(100);

    const el = document.getElementById("lbList");
    if (!rows || rows.length === 0) {
      el.innerHTML = '<div class="notif-empty">Belum ada data.</div>';
      return;
    }
    el.innerHTML = rows.map((p, i) => `
      <div class="lb-row ${p.id === user.id ? "is-me" : ""}">
        <div class="lb-row__rank ${i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : ""}">${i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : i + 1}</div>
        <div class="lb-row__name">${escapeHtml(p.display_name || "Anonim")}${p.id === user.id ? " (kamu)" : ""}</div>
        <div class="lb-row__xp">${p.xp} XP</div>
      </div>`).join("");
  }

  await renderLeaderboard();

  // Realtime: setiap ada perubahan XP di profiles, render ulang leaderboard
  client
    .channel("leaderboard-realtime")
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "profiles" }, renderLeaderboard)
    .subscribe();
})();
</script>
</body>
</html>
